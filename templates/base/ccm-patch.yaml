apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-kcp"
spec:
  kubeadmConfigSpec:
    preKubeadmCommands:
    - |
      KUBERNETES_VERSION_NO_V=${KUBERNETES_VERSION#v}
      VERSION_TO_COMPARE=1.33.0
      # Add cloud-provider settings only for Kubernetes versions <= 1.33.0
      if [ "$(printf '%s\n' "$VERSION_TO_COMPARE" "$KUBERNETES_VERSION_NO_V" | sort -V | head -n1)" = "$KUBERNETES_VERSION_NO_V" ]; then
        echo "Using cloud-provider: external for Kubernetes $KUBERNETES_VERSION" >> /var/log/prekubeadm.log
      else
        echo "Skipping cloud-provider flag as Kubernetes version > 1.33.0" >> /var/log/prekubeadm.log
      fi
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  labels:
    ccm: "nutanix"
  name: "${CLUSTER_NAME}"
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: "${CLUSTER_NAME}-kcfg-0"
spec:
  template:
    spec:
      preKubeadmCommands:
      - |
        KUBERNETES_VERSION_NO_V=${KUBERNETES_VERSION#v}
        VERSION_TO_COMPARE=1.33.0
        # Add cloud-provider settings only for Kubernetes versions <= 1.33.0
        if [ "$(printf '%s\n' "$VERSION_TO_COMPARE" "$KUBERNETES_VERSION_NO_V" | sort -V | head -n1)" = "$KUBERNETES_VERSION_NO_V" ]; then
          echo "Using cloud-provider: external for Kubernetes $KUBERNETES_VERSION" >> /var/log/prekubeadm.log
          # Set up the kubelet directly if needed
          if [ -d /etc/systemd/system ]; then
            mkdir -p /etc/systemd/system/kubelet.service.d
            echo "[Service]" > /etc/systemd/system/kubelet.service.d/20-cloud-provider.conf
            echo "Environment=\"KUBELET_EXTRA_ARGS=--cloud-provider=external\"" >> /etc/systemd/system/kubelet.service.d/20-cloud-provider.conf
            systemctl daemon-reload
          fi
        else
          echo "Skipping cloud-provider flag as Kubernetes version > 1.33.0" >> /var/log/prekubeadm.log
        fi
